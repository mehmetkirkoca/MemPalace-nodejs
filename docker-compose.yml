name: mempalace

services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/mempalace
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mempalace-mcp:
    build:
      context: .
      target: prod
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mempalace
      - MCP_TRANSPORT=http
      - MCP_PORT=3100
    ports:
      - "3100:3100"
    volumes:
      - mempalace_data:/root/.mempalace
      - mempalace_hf_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: ["src/mcpServer.js"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/3100'"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mempalace-cli:
    build:
      context: .
      target: prod
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mempalace
    volumes:
      - mempalace_data:/root/.mempalace
      - mempalace_hf_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["cli"]
    stdin_open: true
    tty: true

  mempalace-dev:
    build:
      context: .
      target: dev
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mempalace
    volumes:
      - .:/app
      - /app/node_modules
      - mempalace_data:/root/.mempalace
      - mempalace_hf_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["dev"]
    stdin_open: true
    tty: true

volumes:
  qdrant_data:
  neo4j_data:
  mempalace_data:
  mempalace_hf_cache:
